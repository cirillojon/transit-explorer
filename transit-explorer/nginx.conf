# Minimal nginx config used by docker-compose.yml.
# Serves the built React app and proxies /api/* to the Flask backend.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache, immutable hashed filenames from Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → backend container
    location /api/ {
        proxy_pass http://backend:8880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback — every unknown route returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't log the noisy health probes
    location = /api/health {
        access_log off;
        proxy_pass http://backend:8880;
    }
}
