# fly.toml app configuration file generated for transit-explorer on 2026-04-20T17:52:18-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'transit-explorer'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  # Single machine + mounted volume can't do a rolling swap (volume can't be
  # mounted twice). `immediate` stops the old machine, starts the new one,
  # accepts ~30-60s of downtime during the OBA preload.
  strategy = 'immediate'

[env]
  FLASK_ENV = 'production'
  FLASK_PORT = '8880'
  GOOGLE_APPLICATION_CREDENTIALS = '/app/service-account.json'
  GUNICORN_TIMEOUT = '30'
  LOG_LEVEL = 'INFO'
  WEB_CONCURRENCY = '4'
  # Per-agency OBA refresh interval for the in-process loader loop
  # (started by bin/start prod alongside gunicorn).
  OBA_REFRESH_TTL_HOURS = '24'

[processes]
  # The string is appended as ARGS to the Dockerfile ENTRYPOINT
  # (`/app/bin/start`). Do NOT prefix with `bin/start` — Fly would
  # then run `/app/bin/start bin/start prod` and the dispatcher would
  # exit 2 with a usage message, putting the machine in a restart loop.
  #
  # NOTE: there is intentionally only ONE process group. We tried a
  # separate `worker` group, but Fly volumes are single-attach so the
  # worker machine couldn't mount tm_data. Instead `bin/start prod`
  # spawns a background `flask data load --loop` next to gunicorn
  # (controlled by RUN_INPROC_LOADER, default on).
  app = 'prod'

[[mounts]]
  source = 'tm_data'
  destination = '/app/tm-instance'

[http_service]
  internal_port = 8880
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    # OBA preloads ~90 routes from the upstream API on boot; give it room
    # before we start probing /api/health, otherwise CI deploys flap.
    grace_period = '3m0s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
