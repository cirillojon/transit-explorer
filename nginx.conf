# Minimal nginx config used by docker-compose.yml.
# Serves the built React app and proxies /api/* to the Flask backend.

# ─── Rate-limit zones (10 MB ≈ 160k unique IPs each) ───
# `general` covers all /api/* traffic; `auth_zone` is a tighter
# bucket for credential-bearing requests so brute-force attempts
# get throttled hard before they reach Flask-Limiter.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;

# Cap connections per IP so a single client can't monopolize workers.
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Generate a request id when the client doesn't send one. Forwarded to
# the backend via X-Request-ID and echoed back in the access log so
# nginx and Flask logs can be cross-correlated (Phase 4).
map $http_x_request_id $request_id_final {
    default $http_x_request_id;
    ""      $request_id;
}

log_format main_json escape=json
    '{"ts":"$time_iso8601","remote":"$remote_addr","request":"$request",'
    '"status":$status,"bytes":$body_bytes_sent,"ref":"$http_referer",'
    '"ua":"$http_user_agent","fwd":"$http_x_forwarded_for",'
    '"req_id":"$request_id_final","upstream_ms":"$upstream_response_time"}';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Hard request limits (slowloris + payload protection) ───
    client_max_body_size       1m;     # JSON-only API; lift per-route if needed
    client_body_timeout        10s;
    client_header_timeout      10s;
    send_timeout               30s;
    keepalive_timeout          30s;
    limit_conn conn_per_ip     50;

    access_log /var/log/nginx/access.log main_json;

    # ─── Security response headers ───
    # HSTS only meaningful when behind TLS termination; harmless on plain
    # HTTP but the browser will ignore it. Set `always` so it's emitted
    # on error responses too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(self), microphone=(), camera=()" always;
    # CSP: SPA bundles + map tiles + Firebase. Tighten further if/when the
    # frontend stops loading inline styles.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' https://apis.google.com; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; "
        "connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com; "
        "font-src 'self' data:; "
        "frame-ancestors 'none'; "
        "base-uri 'self'; "
        "form-action 'self'" always;

    # Static assets — long cache, immutable hashed filenames from Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Auth-prefixed endpoints get the tighter zone. Order matters:
    # more-specific location must precede the catch-all /api/.
    location ~ ^/api/(me|auth)(/|$) {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://backend:8880;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id_final;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # API → backend container
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://backend:8880;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id_final;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # SPA fallback — every unknown route returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't log the noisy health probes
    location = /api/health {
        access_log off;
        proxy_pass http://backend:8880;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
